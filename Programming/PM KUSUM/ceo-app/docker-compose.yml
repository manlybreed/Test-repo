services:
  postgres:
    image: postgres:16-alpine
    container_name: bluridge-ceo-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bluridge
      POSTGRES_PASSWORD: bluridge
      POSTGRES_DB: ceo_app
    volumes:
      - ceo_pgdata:/var/lib/postgresql/data

volumes:
  ceo_pgdata:
